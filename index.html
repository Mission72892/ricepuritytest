/* ============================================================
   RICE PURITY TEST - PREMIUM BLOGGER THEME
   Version: 2026 | Mobile-First | Fully Responsive
   ============================================================ */

/* === CSS VARIABLES === */
:root {
  --bg-primary: #19a337;
  --bg-secondary: #f2a134;
  --bg-card: #f2a134;
  --bg-card-hover: #1f1f38;
  --accent-primary: #e51f1f;
  --accent-secondary: #e51f1f;
  --accent-gold: #f0c040;
  --accent-teal: #00d4b4;
  --text-primary: #ffffff;
  --text-secondary: #ffffff;
  --text-muted: #ffffff;
  --border-color: rgba(108,99,255,0.2);
  --shadow-glow: 0 0 30px rgba(108,99,255,0.15);
  --shadow-card: 0 8px 32px rgba(0,0,0,0.4);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 22px;
  --radius-xl: 32px;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Nunito', 'Segoe UI', sans-serif;
  --transition: color 0.3s cubic-bezier(0.4,0,0.2,1), background-color 0.3s cubic-bezier(0.4,0,0.2,1), border-color 0.3s cubic-bezier(0.4,0,0.2,1), box-shadow 0.3s cubic-bezier(0.4,0,0.2,1), transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s cubic-bezier(0.4,0,0.2,1);
  --header-height: 0px;
}

/* === GLOBAL RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
  max-width: 100vw;
  width: 100%;
}
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  line-height: 1.7;
  overflow-x: hidden;
  width: 100%;
  max-width: 100vw;
  min-height: 100vh;
  background-image: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(108,99,255,0.12) 0%, transparent 70%);
}

/* === TYPOGRAPHY === */
h1,h2,h3,h4,h5,h6 { font-family: var(--font-display); line-height: 1.3; color: var(--text-primary); }
h1 { font-size: clamp(1.4rem, 5vw, 2.8rem); }
h2 { font-size: clamp(1.2rem, 4vw, 2rem); margin-bottom: 1rem; }
h3 { font-size: clamp(1rem, 3vw, 1.5rem); margin-bottom: 0.75rem; }
p { color: var(--text-secondary); margin-bottom: 1rem; font-size: clamp(0.9rem, 2.5vw, 1rem); }
a { color: var(--accent-primary); text-decoration: none; transition: var(--transition); }
a:hover { color: var(--accent-secondary); }
img { max-width: 100%; height: auto; display: block; }
table { max-width: 100%; width: 100%; overflow-x: auto; display: block; border-collapse: collapse; }
pre, code { max-width: 100%; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
iframe { max-width: 100% !important; width: 100%; }
* { min-width: 0; }

/* === LAYOUT === */
.outer-wrapper {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 clamp(0.75rem, 4vw, 1.5rem);
  width: 100%;
  box-sizing: border-box;
}
.main-wrapper {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 2rem;
  padding: 1.5rem 0 2rem;
  align-items: start;
  width: 100%;
}
@media(max-width:960px) {
  .main-wrapper {
    grid-template-columns: 1fr;
    gap: 1.5rem;
    padding: 1rem 0 2rem;
  }
}

/* === HEADER === */
#header-wrap {
  background: rgba(10,10,18,0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 1000;
  width: 100%;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: clamp(0.6rem, 2vw, 1rem) clamp(0.75rem, 3vw, 1.5rem);
  gap: 0.75rem;
  flex-wrap: wrap;
  min-width: 0;
  width: 100%;
}
.site-logo {
  font-family: var(--font-display);
  font-size: clamp(1.1rem, 4vw, 1.5rem);
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  letter-spacing: -0.5px;
  flex-shrink: 0;
}
.site-logo span { color: var(--accent-primary); }

/* ============================================================
   FULL-SITE SEARCH BAR
   Searches: post titles, post content/body, labels, pages
   Uses Blogger's native search + JS enhancement
   ============================================================ */
.header-search {
  flex: 1;
  min-width: 0;
  max-width: 420px;
  width: 100%;
  position: relative;
}
.header-search-form {
  display: flex;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 50px;
  overflow: hidden;
  transition: var(--transition);
  width: 100%;
}
.header-search-form:focus-within {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
}
.header-search-form input {
  background: transparent;
  border: none;
  outline: none;
  padding: 0.55rem 1rem;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: clamp(0.8rem, 2.5vw, 0.9rem);
  flex: 1;
  min-width: 0;
  width: 100%;
}
.header-search-form input::placeholder { color: var(--text-muted); }
.header-search-form button {
  background: var(--accent-primary);
  border: none;
  color: white;
  padding: 0.55rem clamp(0.75rem, 2vw, 1.2rem);
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
  transition: var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
  font-family: var(--font-body);
}
.header-search-form button:hover { background: #5a52e0; }

/* Search dropdown results */
.search-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
  z-index: 9999;
  display: none;
  max-height: 380px;
  overflow-y: auto;
}
.search-dropdown.open { display: block; }
.search-drop-item {
  display: flex;
  flex-direction: column;
  padding: 0.7rem 1rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: var(--transition);
}
.search-drop-item:last-child { border-bottom: none; }
.search-drop-item:hover { background: rgba(108,99,255,0.08); }
.search-drop-title { font-size: 0.88rem; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
.search-drop-meta { font-size: 0.75rem; color: var(--text-muted); }
.search-drop-label {
  display: inline-block;
  background: rgba(108,99,255,0.15);
  color: var(--accent-primary);
  border: 1px solid rgba(108,99,255,0.3);
  border-radius: 50px;
  padding: 2px 8px;
  font-size: 0.68rem;
  font-weight: 700;
  margin-top: 3px;
  margin-right: 3px;
}
.search-drop-type { font-size: 0.68rem; color: var(--accent-teal); font-weight: 700; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.search-drop-no-results { padding: 1rem; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
.search-drop-all {
  display: block;
  text-align: center;
  padding: 0.65rem;
  background: rgba(108,99,255,0.08);
  color: var(--accent-primary);
  font-size: 0.82rem;
  font-weight: 700;
  border-top: 1px solid var(--border-color);
  cursor: pointer;
}
.search-drop-all:hover { background: rgba(108,99,255,0.15); }

@media(max-width:600px) {
  .header-top { flex-direction: column; align-items: stretch; gap: 0.6rem; }
  .header-search { max-width: 100%; }
}

/* === PREMIUM DYNAMIC CATEGORY NAV (auto labels) === */
.premium-nav-wrapper {
  width: 100%;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 9999;
  font-family: var(--font-body);
}
.nav-scroll-container {
  max-width: 100%;
  overflow-x: auto;
  display: flex;
  align-items: center;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.nav-scroll-container::-webkit-scrollbar { display: none; }
.nav-list {
  display: flex;
  list-style: none;
  margin: 0;
  padding: 10px clamp(0.75rem, 3vw, 1.5rem);
  gap: 6px;
  flex-wrap: nowrap;
  min-width: max-content;
}
.nav-item {
  position: relative;
  flex: 0 0 auto;
}
.nav-link {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-card);
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  border-radius: 50px;
  white-space: nowrap;
  transition: var(--transition);
  border: 1px solid var(--border-color);
  font-family: var(--font-body);
}
.nav-link:hover {
  background: var(--accent-primary);
  color: var(--text-primary);
  border-color: var(--accent-primary);
  box-shadow: 0 4px 15px rgba(108,99,255,0.4);
}
.nav-link.active {
  background: var(--accent-primary);
  color: var(--text-primary);
  border-color: var(--accent-primary);
  box-shadow: 0 4px 15px rgba(108,99,255,0.4);
}
.nav-label-count {
  background: rgba(255,255,255,0.2);
  border-radius: 50px;
  padding: 1px 7px;
  font-size: 11px;
  margin-left: 6px;
  font-weight: 800;
}
@media (max-width: 768px) {
  .nav-link { padding: 6px 14px; font-size: 13px; }
}

/* === LABEL POSTS PANEL === */
#label-panel-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.65);
  z-index: 9998;
  backdrop-filter: blur(4px);
}
#label-panel-overlay.open { display: block; }
#label-panel {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), var(--shadow-glow);
  z-index: 9999;
  width: 90%;
  max-width: 640px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#label-panel-head {
  padding: 1.2rem 1.4rem 0.9rem;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#label-panel-title {
  font-family: var(--font-display);
  font-size: clamp(1rem, 3vw, 1.3rem);
  color: var(--text-primary);
  font-weight: 700;
}
#label-panel-close {
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  border-radius: 50%;
  width: 32px; height: 32px;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}
#label-panel-close:hover { background: var(--accent-secondary); color: #fff; border-color: var(--accent-secondary); }
#label-panel-body {
  overflow-y: auto;
  padding: 1rem 1.2rem 1.2rem;
  flex: 1;
}
#label-panel-body::-webkit-scrollbar { width: 6px; }
#label-panel-body::-webkit-scrollbar-track { background: transparent; }
#label-panel-body::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 4px; }
.lp-post-item {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 0.85rem 1rem;
  margin-bottom: 0.7rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  transition: var(--transition);
}
.lp-post-item:last-child { margin-bottom: 0; }
.lp-post-item:hover { border-color: var(--accent-primary); background: var(--bg-card-hover); }
.lp-post-title {
  color: var(--text-primary);
  font-weight: 600;
  font-size: clamp(0.85rem, 2.5vw, 0.98rem);
  text-decoration: none;
  cursor: pointer;
  flex: 1;
  min-width: 0;
  transition: var(--transition);
  word-break: break-word;
}
.lp-post-title:hover { color: var(--accent-primary); }
.lp-open-btn {
  background: transparent;
  border: 1.5px solid var(--accent-primary);
  color: var(--accent-primary);
  border-radius: var(--radius-sm);
  padding: 5px 13px;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  text-decoration: none;
  transition: var(--transition);
  flex-shrink: 0;
}
.lp-open-btn:hover { background: var(--accent-primary); color: #fff; }
#label-panel-loading {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  font-size: 0.9rem;
}
#label-panel-empty {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  font-size: 0.9rem;
  display: none;
}
@media (max-width: 480px) {
  #label-panel { width: 96%; max-height: 85vh; }
  .lp-post-item { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
  .lp-open-btn { width: 100%; text-align: center; }
}

/* === SEARCH RESULTS PAGE === */
.search-results-header {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(108,99,255,0.1) 100%);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: clamp(1.2rem, 4vw, 2rem);
  margin-bottom: 1.5rem;
}
.search-results-title { font-family: var(--font-display); font-size: clamp(1.2rem, 4vw, 1.8rem); margin-bottom: 0.5rem; }
.search-results-meta { color: var(--text-muted); font-size: 0.88rem; }
.search-results-query { color: var(--accent-primary); font-weight: 700; }

/* === LABEL/CATEGORY PAGE === */
.label-page-header {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(108,99,255,0.1) 100%);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: clamp(1.2rem, 4vw, 2rem);
  margin-bottom: 1.5rem;
  position: relative;
  overflow: hidden;
}
.label-page-header::before {
  content: '';
  position: absolute;
  top: -50%; right: -20%;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.label-page-badge {
  display: inline-flex;
  align-items: center;
  background: rgba(108,99,255,0.15);
  border: 1px solid rgba(108,99,255,0.3);
  color: var(--accent-primary);
  padding: 0.3rem 0.9rem;
  border-radius: 50px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}
.label-page-title { font-family: var(--font-display); font-size: clamp(1.3rem, 4vw, 2rem); margin-bottom: 0.5rem; }

/* === PAGES PAGE === */
.pages-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
  margin-top: 1rem;
}
.page-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 1.5rem;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.page-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-primary), var(--accent-teal));
}
.page-card:hover { transform: translateY(-3px); border-color: rgba(108,99,255,0.3); box-shadow: var(--shadow-glow); }
.page-card-icon { font-size: 2rem; margin-bottom: 0.75rem; }
.page-card-title { font-family: var(--font-display); font-size: 1.1rem; color: var(--text-primary); margin-bottom: 0.5rem; }
.page-card-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }
.page-card-link {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  margin-top: 1rem;
  color: var(--accent-primary);
  font-size: 0.82rem;
  font-weight: 700;
}

/* === MAIN TOOL SECTION === */
#tool-section { width: 100%; min-width: 0; }

.tool-header-card {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(108,99,255,0.1) 100%);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: clamp(1.2rem, 4vw, 2.5rem) clamp(1rem, 4vw, 2rem) clamp(1.2rem, 3vw, 2rem);
  margin-bottom: 1.5rem;
  position: relative;
  overflow: hidden;
}
.tool-header-card::before {
  content: '';
  position: absolute;
  top: -50%; right: -20%;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.tool-badge {
  display: inline-flex;
  align-items: center;
  background: rgba(108,99,255,0.15);
  border: 1px solid rgba(108,99,255,0.3);
  color: var(--accent-primary);
  padding: 0.3rem 0.9rem;
  border-radius: 50px;
  font-size: clamp(0.68rem, 2vw, 0.75rem);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

/* === RICE PURITY TEST TOOL === */
#rpt-tool {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-card);
  margin-bottom: 1.5rem;
  width: 100%;
}

.rpt-progress-bar-wrap {
  background: var(--bg-secondary);
  padding: clamp(1rem, 3vw, 1.5rem) clamp(1rem, 4vw, 2rem) 1rem;

/* === POSTS GRID === */

.post-card {

/* === SINGLE POST / ARTICLE BODY === */

<script>
//<![CDATA[
// ============================================================
//  POWERFUL FULL-SITE SEARCH
//  Searches: post titles, post body text, h2/h3/h4/h5 headings,
//            home page visible content, labels/categories
//  Highlights matching keywords in results
//  Shows dropdown previews + full results page with highlights
// ============================================================
(function(){
  var searchInput   = document.getElementById('site-search-input');
  var sidebarInput  = document.getElementById('sidebar-search-input');
  var sidebarDropdown = document.getElementById('sidebar-search-dropdown');
  var searchForm    = document.getElementById('site-search-form');
  var dropdown      = document.getElementById('search-dropdown');
  var searchTimer   = null;
  var lastQuery     = '';
  var allPostsCache = null;   // cache all posts after first fetch
  var BLOG_URL      = window.location.origin;

  /* ── helpers ── */
  function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function stripTags(s){ return (s||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim(); }

  // Extract text of h2-h5 tags from raw HTML
  function extractHeadings(html){
    var headings = [];
    var re = /<h[2-5][^>]*>([\s\S]*?)<\/h[2-5]>/gi;
    var m;
    while((m = re.exec(html)) !== null){
      var t = stripTags(m[1]).trim();
      if(t) headings.push(t);
    }
    return headings;
  }

  // Highlight query words in a plain-text string
  function highlight(text, query){
    if(!text || !query) return escHtml(text);
    var words = query.trim().split(/\s+/).filter(Boolean);
    var escaped = escHtml(text);
    words.forEach(function(w){
      var re = new RegExp('(' + w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
      escaped = escaped.replace(re, '<mark style="background:rgba(108,99,255,0.35);color:#fff;border-radius:3px;padding:0 2px;">$1</mark>');
    });
    return escaped;
  }

  // Get a short snippet around the first keyword hit
  function getSnippet(text, query, len){
    len = len || 120;
    var words = query.trim().split(/\s+/).filter(Boolean);
    var lower = text.toLowerCase();
    var pos = -1;
    for(var i=0;i<words.length;i++){
      var p = lower.indexOf(words[i].toLowerCase());
      if(p !== -1){ pos = p; break; }
    }
    if(pos === -1) return text.substring(0, len);
    var start = Math.max(0, pos - 40);
    var end   = Math.min(text.length, start + len);
    return (start > 0 ? '...' : '') + text.substring(start, end) + (end < text.length ? '...' : '');
  }

  /* ── fetch ALL posts (no search filter) and cache ── */
  function fetchAllPosts(cb){
    if(allPostsCache){ cb(allPostsCache); return; }
    // Fetch up to 500 posts for thorough search
    var url = BLOG_URL + '/feeds/posts/default?alt=json&max-results=500';
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        allPostsCache = (data.feed && data.feed.entry) ? data.feed.entry : [];
        cb(allPostsCache);
      })
      .catch(function(){ cb([]); });
  }

  /* ── score and filter entries against query ── */
  function filterEntries(entries, query){
    var words = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
    var results = [];
    entries.forEach(function(entry){
      var title    = entry.title ? entry.title.$t : '';
      var rawBody  = entry.content ? entry.content.$t : (entry.summary ? entry.summary.$t : '');
      var bodyText = stripTags(rawBody);
      var headings = extractHeadings(rawBody);
      var labels   = [];
      if(entry.category){ entry.category.forEach(function(c){ labels.push(c.term); }); }

      var titleL    = title.toLowerCase();
      var bodyL     = bodyText.toLowerCase();
      var headingsL = headings.map(function(h){ return h.toLowerCase(); });
      var labelsL   = labels.map(function(l){ return l.toLowerCase(); });

      var score = 0;
      var matchedHeadings = [];
      words.forEach(function(w){
        // Title hits: highest weight
        if(titleL.indexOf(w) !== -1) score += 10;
        // Heading hits
        headings.forEach(function(h, i){
          if(headingsL[i].indexOf(w) !== -1){ score += 6; if(matchedHeadings.indexOf(h)===-1) matchedHeadings.push(h); }
        });
        // Body hits
        if(bodyL.indexOf(w) !== -1) score += 3;
        // Label hits
        labelsL.forEach(function(l){ if(l.indexOf(w) !== -1) score += 4; });
      });

      if(score > 0){
        var url = '';
        if(entry.link){ for(var i=0;i<entry.link.length;i++){ if(entry.link[i].rel==='alternate'){url=entry.link[i].href;break;} } }
        results.push({ title: title, url: url, bodyText: bodyText, headings: headings, matchedHeadings: matchedHeadings, labels: labels, score: score, rawBody: rawBody });
      }
    });
    results.sort(function(a,b){ return b.score - a.score; });
    return results;
  }

  /* ── also search home page visible content ── */
  function searchHomePage(query){
    var words = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
    var homeContent = document.getElementById('tool-section');
    var seoContent  = document.querySelector('.seo-content');
    var faqSection  = document.querySelector('.faq-section');
    var found = false;
    var matchedSections = [];

    [homeContent, seoContent, faqSection].forEach(function(el){
      if(!el) return;
      var text = el.innerText || el.textContent || '';
      var lower = text.toLowerCase();
      words.forEach(function(w){
        if(lower.indexOf(w) !== -1) found = true;
      });
      if(found){ matchedSections.push(el); found = false; }
    });

    return matchedSections.length > 0;
  }

  /* ── render dropdown to a specific target element ── */
  function renderDropdownTo(target, results, query, homeMatch){
    var html = '';
    var count = 0;

    // Home page match
    if(homeMatch){
      html += '<div class="search-drop-item" onclick="window.location.href=\'/\'">' +
        '<div class="search-drop-type">🏠 Home Page</div>' +
        '<div class="search-drop-title">' + highlight('Rice Purity Test — Home', query) + '</div>' +
        '<div class="search-drop-meta">Keyword found in home page content. Click to view and see highlights.</div>' +
      '</div>';
      count++;
    }

    // Label matches (deduplicated)
    var shownLabels = {};
    results.forEach(function(r){
      r.labels.forEach(function(l){
        if(shownLabels[l]) return;
        var words = query.toLowerCase().trim().split(/\s+/);
        var hit = words.some(function(w){ return l.toLowerCase().indexOf(w) !== -1; });
        if(hit){
          shownLabels[l] = true;
          var lUrl = BLOG_URL + '/search/label/' + encodeURIComponent(l);
          html += '<div class="search-drop-item" onclick="window.location.href=\'' + lUrl + '\'">' +
            '<div class="search-drop-type">🏷 Category</div>' +
            '<div class="search-drop-title">' + highlight(l, query) + '</div>' +
            '<div class="search-drop-meta">Browse all posts in this category</div>' +
          '</div>';
          count++;
        }
      });
    });

    // Post results
    results.forEach(function(r){
      if(count >= 10) return;
      var labelHtml = r.labels.map(function(l){
        return '<a class="search-drop-label" href="' + BLOG_URL + '/search/label/' + encodeURIComponent(l) + '" onclick="event.stopPropagation();">' + escHtml(l) + '</a>';
      }).join('');

      var snippet = getSnippet(r.bodyText, query, 110);
      var headingHtml = '';
      if(r.matchedHeadings.length > 0){
        headingHtml = '<div style="font-size:0.72rem;color:var(--accent-teal);margin-top:3px;">📌 ' +
          r.matchedHeadings.slice(0,2).map(function(h){ return highlight(h, query); }).join(' · ') +
        '</div>';
      }

      html += '<div class="search-drop-item" onclick="window.location.href=\'' + escHtml(r.url) + '\'">' +
        '<div class="search-drop-type">📄 Post</div>' +
        '<div class="search-drop-title">' + highlight(r.title, query) + '</div>' +
        '<div class="search-drop-meta">' + highlight(snippet, query) + '</div>' +
        headingHtml +
        (labelHtml ? '<div style="margin-top:4px;">' + labelHtml + '</div>' : '') +
      '</div>';
      count++;
    });

    if(count === 0){
      html = '<div class="search-drop-no-results">No results for &ldquo;' + escHtml(query) + '&rdquo;. Try broader keywords.</div>';
    }
    html += '<a class="search-drop-all" href="/search?q=' + encodeURIComponent(query) + '">View all results for &ldquo;' + escHtml(query) + '&rdquo; &#8594;</a>';
    target.innerHTML = html;
    target.classList.add('open');
  }

  /* ── highlight on search results/home page after navigation ── */
  (function applyPageHighlights(){
    var params = new URLSearchParams(window.location.search);
    var q = params.get('q');
    if(!q || q.trim().length < 2) return;
    var words = q.trim().split(/\s+/).filter(Boolean);
    // Highlight in page body after a short delay so DOM is ready
    setTimeout(function(){
      var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
        acceptNode: function(node){
          var parent = node.parentElement;
          if(!parent) return NodeFilter.FILTER_REJECT;
          var tag = parent.tagName;
          // Skip scripts, styles, inputs
          if(tag === 'SCRIPT' || tag === 'STYLE' || tag === 'INPUT' || tag === 'TEXTAREA') return NodeFilter.FILTER_REJECT;
          // Only highlight in content areas
          if(parent.closest && (parent.closest('.single-post-body') || parent.closest('.post-card') ||
             parent.closest('.seo-content') || parent.closest('.faq-section') ||
             parent.closest('.search-results-header') || parent.closest('.tool-header-card') ||
             parent.closest('.posts-grid') )){
            return NodeFilter.FILTER_ACCEPT;
          }
          return NodeFilter.FILTER_REJECT;
        }
      }, false);
      var nodes = [];
      while(walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach(function(node){
        var text = node.nodeValue;
        var lower = text.toLowerCase();
        var hit = words.some(function(w){ return lower.indexOf(w.toLowerCase()) !== -1; });
        if(!hit) return;
        var span = document.createElement('span');
        var html = escHtml(text);
        words.forEach(function(w){
          var re = new RegExp('(' + w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
          html = html.replace(re, '<mark style="background:rgba(108,99,255,0.4);color:#fff;border-radius:3px;padding:0 2px;font-weight:700;">$1</mark>');
        });
        span.innerHTML = html;
        node.parentNode.replaceChild(span, node);
      });
    }, 600);
  })();

  /* ── wire up inputs ── */
  function wireInput(input, targetDropdown){
    if(!input) return;
    input.addEventListener('input', function(){
      clearTimeout(searchTimer);
      var q = this.value.trim();
      if(q.length < 2){ closeDrop(targetDropdown); return; }
      // For sidebar, use its dropdown; for header, use main dropdown
      var activeDrop = targetDropdown;
      searchTimer = setTimeout(function(){
        if(!q || q.trim().length < 2){ closeDrop(activeDrop); return; }
        q = q.trim();
        if(q === lastQuery && activeDrop === dropdown) return;
        lastQuery = q;
        activeDrop.innerHTML = '<div class="search-drop-no-results" style="padding:1rem;text-align:center;color:var(--text-muted);">🔍 Searching all posts &amp; content...</div>';
        activeDrop.classList.add('open');
        var homeMatch = searchHomePage(q);
        fetchAllPosts(function(entries){
          var results = filterEntries(entries, q);
          renderDropdownTo(activeDrop, results, q, homeMatch);
        });
      }, 320);
    });
    input.addEventListener('focus', function(){
      var q = this.value.trim();
      if(q.length >= 2){
        lastQuery = '';
        var homeMatch = searchHomePage(q);
        fetchAllPosts(function(entries){
          var results = filterEntries(entries, q);
          renderDropdownTo(targetDropdown, results, q, homeMatch);
        });
      }
    });
  }

  function closeDrop(el){
    if(!el) return;
    el.classList.remove('open');
    el.innerHTML = '';
    lastQuery = '';
  }
  function closeDropdown(){ closeDrop(dropdown); }

  wireInput(searchInput, dropdown);
  wireInput(sidebarInput, sidebarDropdown);

  document.addEventListener('click', function(e){
    var wrap = document.getElementById('site-search-wrap');
    if(wrap && !wrap.contains(e.target)) closeDropdown();
  });

  if(searchInput){
    searchInput.addEventListener('keydown', function(e){ if(e.key==='Escape') closeDropdown(); });
  }

// ============================================================
//  DYNAMIC LABEL NAV — Auto-fetches all blog labels
//  Injects them as nav items in the category bar
// ============================================================
(function(){
  var navList = document.getElementById('nav-list');
  var BLOG_URL = window.location.origin;
  var currentPath = window.location.pathname;

  // Set active states on static nav links
  function setNavActive() {
    var links = navList.querySelectorAll('.nav-link');
    links.forEach(function(link) {
      var href = link.getAttribute('href') || '';
      // Home
      if (href === '/' && (currentPath === '/' || currentPath === '')) {
        link.classList.add('active');
      }
      // Label pages
      if (href.indexOf('/search/label/') !== -1 && currentPath.indexOf('/search/label/') !== -1) {
        var navLabel = decodeURIComponent(href.replace('/search/label/', ''));
        var pageLabel = decodeURIComponent(currentPath.replace('/search/label/', '').replace(/\/$/, ''));
        if (navLabel.toLowerCase() === pageLabel.toLowerCase()) {
          link.classList.add('active');
        }
      }
    });
  }

  // Fetch all labels via Blogger feed
  function fetchLabels() {
    // Use max-results=500 to get as many labels as possible
    var url = BLOG_URL + '/feeds/posts/default?alt=json&max-results=500';
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        var entries = (data.feed && data.feed.entry) ? data.feed.entry : [];
        var labelMap = {};
        entries.forEach(function(entry) {
          if (entry.category) {
            entry.category.forEach(function(cat) {
              if (cat.term) {
                labelMap[cat.term] = (labelMap[cat.term] || 0) + 1;
              }
            });
          }
        });
        var labels = Object.keys(labelMap).sort();
        injectLabelNav(labels, labelMap);
        setNavActive();
      })
      .catch(function(){
        // If fetch fails, just set active on existing items
        setNavActive();
      });
  }

  function injectLabelNav(labels, countMap) {
    // Remove placeholder
    var placeholder = document.getElementById('nav-labels-placeholder');
    if (placeholder) placeholder.remove();

    // Inject a divider
    if (labels.length > 0) {
      var dividerLi = document.createElement('li');
      dividerLi.className = 'nav-item';
      dividerLi.innerHTML = '<span style="color:var(--text-muted);font-size:12px;padding:0 4px;opacity:0.4;">|</span>';
      navList.appendChild(dividerLi);
    }

    labels.forEach(function(label) {
      var li = document.createElement('li');
      li.className = 'nav-item';
      var count = countMap[label] || 0;
      var href = '/search/label/' + encodeURIComponent(label);
      li.innerHTML = '<a class="nav-link" href="' + href + '">' +
        escLabel(label) +
        (count > 0 ? '<span class="nav-label-count">' + count + '</span>' : '') +
      '</a>';
      navList.appendChild(li);
    });
  }

  function escLabel(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Set active on initial static links first
  setNavActive();
  // Then fetch and inject labels
  fetchLabels();
})();


// ============================================================
//  LABEL POSTS PANEL — intercept nav label clicks, show panel
// ============================================================
(function(){
  var overlay = document.getElementById('label-panel-overlay');
  var panelTitle = document.getElementById('label-panel-title');
  var panelLoading = document.getElementById('label-panel-loading');
  var panelEmpty = document.getElementById('label-panel-empty');
  var panelList = document.getElementById('label-panel-list');
  var BLOG_URL = window.location.origin;

  function escH(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.closeLabelPanel = function() {
    overlay.classList.remove('open');
    panelList.innerHTML = '';
    panelEmpty.style.display = 'none';
    panelLoading.style.display = 'block';
  };

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) window.closeLabelPanel();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') window.closeLabelPanel();
  });

  function openLabelPanel(labelName, labelHref) {
    panelTitle.textContent = String.fromCodePoint(0x1F3F7) + ' ' + labelName;
    panelLoading.style.display = 'block';
    panelEmpty.style.display = 'none';
    panelList.innerHTML = '';
    overlay.classList.add('open');

    var url = BLOG_URL + '/feeds/posts/default/-/' + encodeURIComponent(labelName) + '?alt=json&max-results=50';
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        panelLoading.style.display = 'none';
        var entries = (data.feed && data.feed.entry) ? data.feed.entry : [];
        if (entries.length === 0) {
          panelEmpty.style.display = 'block';
          return;
        }
        var html = '';
        entries.forEach(function(entry) {
          var title = entry.title ? entry.title.$t : 'Untitled';
          var postUrl = '';
          if (entry.link) {
            for (var i = 0; i < entry.link.length; i++) {
              if (entry.link[i].rel === 'alternate') { postUrl = entry.link[i].href; break; }
            }
          }
          html += '<div class="lp-post-item">' +
            '<a class="lp-post-title" href="' + escH(postUrl) + '">' + escH(title) + '</a>' +
            '<a class="lp-open-btn" href="' + escH(postUrl) + '">Open Post</a>' +
          '</div>';
        });
        panelList.innerHTML = html;
      })
      .catch(function(){
        panelLoading.style.display = 'none';
        panelList.innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--text-muted);">Could not load posts. <a href="' + escH(labelHref) + '" style="color:var(--accent-primary);">View label page instead</a></div>';
      });
  }

  // Event delegation on nav list to intercept label link clicks
  var navList = document.getElementById('nav-list');
  if (navList) {
    navList.addEventListener('click', function(e) {
      var a = e.target.closest('a.nav-link');
      if (!a) return;
      var href = a.getAttribute('href') || '';
      if (href.indexOf('/search/label/') === -1) return;
      e.preventDefault();
      var labelName = decodeURIComponent(href.replace(/^\/search\/label\//, ''));
      openLabelPanel(labelName, href);
    });
  }
})();

function renderQuestions() {
  var panel = document.getElementById('rpt-questions');
  if (!panel) return;
  panel.innerHTML = '';
  for (var c = 0; c < RPT_CATEGORIES.length; c++) {
    var heading = document.createElement('div');
    heading.className = 'rpt-cat-heading';
    heading.innerHTML = '<span class="rpt-cat-num">' + (c + 1) + '</span>' + RPT_CATEGORIES[c].name;
    panel.appendChild(heading);
    for (var q = 0; q < RPT_CATEGORIES[c].questions.length; q++) {
      var i = c * 10 + q;
      var qText = RPT_CATEGORIES[c].questions[q];
      var isChecked = state.checked[i];
      var item = document.createElement('label');
      item.className = 'rpt-q-item' + (isChecked ? ' checked' : '');
      item.setAttribute('data-idx', String(i));
      item.innerHTML =
        '<input type="checkbox" class="rpt-native-cb" data-idx="' + i + '"' + (isChecked ? ' checked' : '') + '/>' +
        '<div class="rpt-checkbox" aria-hidden="true"></div>' +
        '<div class="rpt-q-num">' + (i + 1) + '</div>' +
        '<div class="rpt-q-text">' + qText + '</div>';
      panel.appendChild(item);
    }
  }
  var cbs = panel.querySelectorAll('.rpt-native-cb');
  for (var k = 0; k < cbs.length; k++) {
    (function(cb) {
      cb.addEventListener('change', function() {
        var idx = parseInt(cb.getAttribute('data-idx'));
        state.checked[idx] = cb.checked;
        var lbl = cb.closest('.rpt-q-item');
        if (cb.checked) { lbl.classList.add('checked'); } else { lbl.classList.remove('checked'); }
        updateProgress();
      });
    })(cbs[k]);
  }
  updateProgress();
}

function updateProgress() {
  var answered = state.checked.filter(Boolean).length;
  var progText = document.getElementById('prog-text');
  var progFill = document.getElementById('prog-fill');
  if (progText) progText.textContent = answered + ' / 100 answered';
  if (progFill) progFill.style.width = answered + '%';

function calculateScore() {
  var checked = state.checked.filter(Boolean).length;
  var score = 100 - checked;
  state.score = score;
  var resultEl = document.getElementById('rpt-result');
  var numEl = document.getElementById('result-num');
  var titleEl = document.getElementById('result-title');
  var descEl = document.getElementById('result-desc');
  if (!resultEl) return;
  if (numEl) numEl.textContent = score;
  var info = getScoreInfo(score);
  if (titleEl) titleEl.textContent = info.title;
  if (descEl) descEl.textContent = info.desc;
  var deg = Math.round((score / 100) * 360);
  var ring = document.getElementById('result-ring');
  if (ring) ring.style.background = 'conic-gradient(' + info.color + ' ' + deg + 'deg, rgba(108,99,255,0.1) ' + deg + 'deg)';
  resultEl.style.display = 'block';
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  showToast('Your score: ' + score + '/100 — ' + info.title, 'success');
}

function getScoreInfo(score) {
  if (score >= 90) return { title: 'Pure Soul', desc: 'You have experienced very little of what the world offers. Your score places you among the most innocent test-takers globally.', color: '#22d3ee' };
  if (score >= 70) return { title: 'Mostly Innocent', desc: 'A typical score for college freshmen and sophomores. You have had some experiences while remaining relatively sheltered.', color: '#6c63ff' };
  if (score >= 50) return { title: 'Average Explorer', desc: 'You score right in the global average range for college students. You are right where most people your age land.', color: '#f0c040' };
  if (score >= 30) return { title: 'Experienced', desc: 'You have accumulated significant life experience across many of the test categories.', color: '#f97316' };
  return { title: 'Seasoned Veteran', desc: 'A very low score — you have encountered nearly everything the test covers.', color: '#ff6584' };
}

function compareScores() {
  var a = parseInt(document.getElementById('comp-a').value);
  var b = parseInt(document.getElementById('comp-b').value);
  if (isNaN(a) || isNaN(b) || a < 0 || b < 0 || a > 100 || b > 100) return;
  var bar = document.getElementById('comp-bar');
  var labels = document.getElementById('comp-labels');
  var fillA = document.getElementById('comp-fill-a');
  var fillB = document.getElementById('comp-fill-b');
  if (!bar) return;
  bar.style.display = 'block';
  if (labels) labels.style.display = 'flex';
  var total = a + b;
  if (total === 0) { if(fillA) fillA.style.width = '50%'; if(fillB) fillB.style.width = '50%'; return; }
  if (fillA) fillA.style.width = Math.round((a / total) * 100) + '%';
  if (fillB) fillB.style.width = Math.round((b / total) * 100) + '%';
  var txtA = document.getElementById('comp-txt-a');
  var txtB = document.getElementById('comp-txt-b');
  if (txtA) txtA.textContent = 'Score A: ' + a + (a > b ? ' (Higher)' : '');
  if (txtB) txtB.textContent = (b > a ? '(Higher) ' : '') + 'Score B: ' + b;
}

function buildTOC() {
  var list = document.getElementById('toc-list');
  if (!list) return;

  /* Collect h2 headings from the article and the FAQ section */
  var containers = document.querySelectorAll('.seo-content, .faq-section');
  var headings = [];
  containers.forEach(function(c) {
    c.querySelectorAll('h2').forEach(function(h) { headings.push(h); });
  });

  if (headings.length === 0) {
    document.getElementById('toc-box').style.display = 'none';
    return;
  }

  var usedIds = {};
  list.innerHTML = '';

  headings.forEach(function(h, i) {
    /* Build a clean slug from the heading text */
    var rawText = h.textContent.replace(/\s+/g, ' ').trim();
    var slug = rawText
      .toLowerCase()
      .replace(/[^a-z0-9\s-]/g, '')
      .trim()
      .replace(/\s+/g, '-')
      .substring(0, 60);
    if (!slug) slug = 'section';

    /* Ensure uniqueness */
    var base = slug;
    var count = 1;
    while (usedIds[slug]) { slug = base + '-' + (++count); }
    usedIds[slug] = true;

    /* Stamp the id onto the real heading */
    h.id = slug;

    /* Add a subtle scroll-margin so sticky header doesn't hide it */
    h.style.scrollMarginTop = '80px';

    /* Build TOC entry */
    var num = (i + 1 < 10 ? '0' : '') + (i + 1);
    var li = document.createElement('li');
    li.className = 'toc-item';
    var a = document.createElement('a');
    a.className = 'toc-link';
    a.href = '#' + slug;
    a.innerHTML = '<span class="toc-num">' + num + '</span><span class="toc-label">' + rawText + '</span>';

    /* Smooth-scroll with offset for sticky header */
    a.addEventListener('click', function(e) {
      e.preventDefault();
      var target = document.getElementById(slug);
      if (!target) return;
      var offset = 80;
      var top = target.getBoundingClientRect().top + window.pageYOffset - offset;
      window.scrollTo({ top: top, behavior: 'smooth' });
      /* Update URL hash without jumping */
      if (history.pushState) { history.pushState(null, null, '#' + slug); }
    });

    li.appendChild(a);
    list.appendChild(li);
  });
}

});

});
